server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: order-service
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5434/orders
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  threads:
    virtual:
      enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: book_user
    password: book_password

flyway:
  enabled: true
  locations: classpath:db/migration

jpa:
  hibernate:
    ddl-auto: validate
    deferred-datasource-initialization: true
#
#logging:
#  level:
#    org.springframework: DEBUG


management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

tracing:
  sampling:
    probability: 1.0

zipkin:
  tracing:
    endpoint: "http://localhost:9411/api/v2/spans"

springdoc:
  api-docs:
    path: /v3/api-docs
