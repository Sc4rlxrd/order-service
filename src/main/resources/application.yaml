server:
  port: 8082

spring:
  datasource:
    platform: postgres
    url: jdbc:postgresql://localhost:5434/orders
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  threads:
    virtual:
      enabled: true

flyway:
  enabled: true
  locations: classpath:db/migration

jpa:
  hibernate:
    ddl-auto: validate
    deferred-datasource-initialization: true

payment:
  url: http://localhost:8083/payments

resilience4j:
  retry:
    instances:
      paymentRetry:
        max-attempts: 3
        wait-duration: 2s

  circuitbreaker:
    instances:
      paymentCircuit:
        sliding-window-size: 5
        failure-rate-threshold: 50

  timelimiter:
    instances:
      paymentTimeout:
        timeout-duration: 2s
